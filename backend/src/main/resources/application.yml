server:
  port: 8080

spring:
  application:
    name: secure-email-system
  datasource:
    url: jdbc:h2:mem:emaildb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:no-reply@example.com}
    receive:
      enabled: ${MAIL_RECEIVE_ENABLED:false}
      protocol: ${MAIL_RECEIVE_PROTOCOL:imaps}
      host: ${MAIL_RECEIVE_HOST:imap.gmail.com}
      port: ${MAIL_RECEIVE_PORT:993}
      username: ${MAIL_RECEIVE_USERNAME:}
      password: ${MAIL_RECEIVE_PASSWORD:}
      folder: ${MAIL_RECEIVE_FOLDER:INBOX}
      max-fetch: ${MAIL_RECEIVE_MAX_FETCH:10}
